name: Bug report
description: Report a reproducible Vitheim bug.
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide minimal steps, input, expected behavior, and actual behavior.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Vitheim commit/version, Rust version, target, and operating system.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security impact
      description: Do not include exploitable details. Use SECURITY.md for private reports.
    validations:
      required: false

