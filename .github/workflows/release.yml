name: Release Metadata Check

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to validate (vX.Y.Z)
        required: true
        type: string

permissions:
  contents: read

jobs:
  metadata:
    name: Validate release evidence without publishing
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Install pinned verification tools
        run: |
          cargo install --locked cargo-deny --version 0.20.2
          cargo install --locked cargo-audit --version 0.22.2
          cargo install --locked cargo-sbom --version 0.10.0

      - name: Generate SBOM
        run: scripts/generate-sbom.sh --write

      - name: Validate release evidence
        run: scripts/validate-release-readiness.sh "${{ inputs.version }}"

      - name: Assert crate publication remains disabled
        run: scripts/check_workspace_policy.sh
