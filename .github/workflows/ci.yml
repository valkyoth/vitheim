name: Rust CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Format, lint, test, policy, and audit
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Install pinned security tools
        run: |
          cargo install --locked cargo-deny --version 0.20.2
          cargo install --locked cargo-audit --version 0.22.2
          cargo install --locked cargo-sbom --version 0.10.0

      - name: Run local check gate
        run: scripts/checks.sh

      - name: Generate and validate SBOM
        run: |
          scripts/generate-sbom.sh --write
          scripts/generate-sbom.sh --check

  host-tests:
    name: Host tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Test workspace
        run: cargo test --workspace --all-features --locked

  portable-core:
    name: Core target (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-pc-windows-msvc
          - x86_64-unknown-freebsd
          - x86_64-unknown-netbsd
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - aarch64-linux-android
          - aarch64-apple-ios

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install target
        run: rustup target add "${{ matrix.target }}"

      - name: Check dependency-free no_std workspace
        run: cargo check --workspace --all-features --locked --target "${{ matrix.target }}"
